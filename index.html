<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universal AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html, body {
  height: 100%;
}
.typing-cursor::after {
  content: "|";
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,100%{opacity:1}
  50%{opacity:0}
}
</style>
</head>

<body class="min-h-screen flex bg-gray-100 dark:bg-gray-900">

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-900 z-50 text-xl font-semibold">
  Loading App...
</div>

<!-- SIDEBAR -->
<div id="sidebar"
class="fixed md:relative z-40 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">

  <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
    <span class="font-bold">Chats</span>
    <button id="closeSidebar" class="md:hidden text-xl">✕</button>
  </div>

  <div class="p-3">
    <button id="newChat" class="w-full bg-blue-500 text-white py-2 rounded-lg">+ New Chat</button>
  </div>

  <div id="chatList" class="flex-1 overflow-y-auto px-2 pb-4 space-y-2"></div>

  <div class="p-4 border-t dark:border-gray-700 space-y-2">
    <button id="settingsBtn" class="w-full text-sm bg-gray-200 dark:bg-gray-700 py-2 rounded">Settings</button>
    <button id="darkToggle" class="w-full text-sm bg-gray-200 dark:bg-gray-700 py-2 rounded">Toggle Dark</button>
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col w-full">

  <!-- TOP BAR -->
  <div class="flex items-center p-4 border-b dark:border-gray-700 bg-white dark:bg-gray-800">
    <button id="openSidebar" class="md:hidden text-2xl mr-4">☰</button>
    <h1 id="chatTitle" class="font-semibold">New Chat</h1>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

  <!-- INPUT -->
  <div class="sticky bottom-0 bg-white dark:bg-gray-800 border-t dark:border-gray-700 p-3">
    <div class="flex gap-2">
      <textarea id="messageInput" rows="1"
        class="flex-1 resize-none p-3 rounded-lg border dark:bg-gray-700 dark:border-gray-600"
        placeholder="Message AI..."></textarea>
      <button id="sendBtn" class="bg-blue-500 text-white px-5 rounded-lg">Send</button>
    </div>
  </div>

</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 w-96 p-6 rounded-lg space-y-4">
    <h2 class="text-lg font-semibold">Settings</h2>

    <input id="apiKeyInput" type="password" placeholder="OpenRouter API Key"
      class="w-full p-2 border rounded dark:bg-gray-700">

    <input id="modelInput" type="text"
      value="deepseek/deepseek-r1:free"
      class="w-full p-2 border rounded dark:bg-gray-700">

    <textarea id="systemPromptInput" rows="3"
      placeholder="System Prompt (optional)"
      class="w-full p-2 border rounded dark:bg-gray-700"></textarea>

    <div class="flex justify-end gap-2">
      <button id="saveSettings" class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
      <button id="closeSettings" class="bg-gray-300 dark:bg-gray-600 px-4 py-2 rounded">Close</button>
    </div>
  </div>
</div>

<script>
(function(){

/* ==============================
   SAFE INIT
============================== */

const loading = document.getElementById("loading");

try {

/* ==============================
   STATE
============================== */

let state = {
  apiKey: localStorage.getItem("apiKey") || "",
  model: localStorage.getItem("model") || "deepseek/deepseek-r1:free",
  chats: JSON.parse(localStorage.getItem("chats") || "[]"),
  activeChatId: localStorage.getItem("activeChatId") || null,
  dark: localStorage.getItem("darkMode") === "true"
};

if(state.dark){
  document.documentElement.classList.add("dark");
}

/* ==============================
   HELPERS
============================== */

function saveState(){
  localStorage.setItem("apiKey", state.apiKey);
  localStorage.setItem("model", state.model);
  localStorage.setItem("chats", JSON.stringify(state.chats));
  localStorage.setItem("activeChatId", state.activeChatId);
  localStorage.setItem("darkMode", state.dark);
}

function createChat(){
  const id = Date.now().toString();
  const chat = {
    id,
    title: "New Chat",
    messages: [],
    systemPrompt: ""
  };
  state.chats.unshift(chat);
  state.activeChatId = id;
  saveState();
  renderChatList();
  renderMessages();
}

function getActiveChat(){
  return state.chats.find(c => c.id === state.activeChatId);
}

/* ==============================
   RENDER
============================== */

function renderChatList(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  state.chats.forEach(chat=>{
    const div = document.createElement("div");
    div.className = "p-2 rounded cursor-pointer bg-gray-100 dark:bg-gray-700 flex justify-between items-center";
    div.innerHTML = `
      <span class="truncate">${chat.title}</span>
      <div class="flex gap-1">
        <button class="rename text-xs">✏</button>
        <button class="delete text-xs">🗑</button>
      </div>
    `;
    div.onclick = ()=>{ state.activeChatId = chat.id; saveState(); renderMessages(); };
    div.querySelector(".delete").onclick = (e)=>{
      e.stopPropagation();
      state.chats = state.chats.filter(c=>c.id!==chat.id);
      if(state.activeChatId===chat.id){
        state.activeChatId = state.chats[0]?.id || null;
      }
      saveState();
      renderChatList();
      renderMessages();
    };
    div.querySelector(".rename").onclick = (e)=>{
      e.stopPropagation();
      const name = prompt("Rename chat:", chat.title);
      if(name){ chat.title = name; saveState(); renderChatList(); }
    };
    list.appendChild(div);
  });
}

function renderMessages(){
  const chat = getActiveChat();
  const container = document.getElementById("messages");
  container.innerHTML = "";
  if(!chat){ document.getElementById("chatTitle").textContent="New Chat"; return; }
  document.getElementById("chatTitle").textContent = chat.title;

  chat.messages.forEach(msg=>{
    const div = document.createElement("div");
    div.className = msg.role==="user"
      ? "text-right"
      : "text-left";
    div.innerHTML = `
      <div class="inline-block max-w-xl p-3 rounded-lg ${
        msg.role==="user"
        ? "bg-blue-500 text-white"
        : "bg-gray-200 dark:bg-gray-700"
      }">
        ${marked.parse(msg.content)}
      </div>
    `;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

/* ==============================
   STREAM RESPONSE
============================== */

async function sendMessage(){

  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if(!text) return;
  if(!state.apiKey){ alert("Add API key in settings."); return; }

  let chat = getActiveChat();
  if(!chat){ createChat(); chat = getActiveChat(); }

  chat.messages.push({role:"user", content:text});
  input.value="";
  renderMessages();

  const aiMessage = {role:"assistant", content:""};
  chat.messages.push(aiMessage);
  renderMessages();

  const container = document.getElementById("messages");
  const aiDiv = container.lastChild.querySelector("div");

  try{

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+state.apiKey
      },
      body: JSON.stringify({
        model: state.model,
        messages:[
          ...(chat.systemPrompt?[{role:"system",content:chat.systemPrompt}]:[]),
          ...chat.messages.filter(m=>m.role!=="assistant")
        ],
        stream:true
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder("utf-8");

    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value);
      chunk.split("\n").forEach(line=>{
        if(line.startsWith("data: ") && !line.includes("[DONE]")){
          try{
            const json = JSON.parse(line.replace("data: ",""));
            const token = json.choices?.[0]?.delta?.content;
            if(token){
              aiMessage.content += token;
              aiDiv.innerHTML = marked.parse(aiMessage.content) + '<span class="typing-cursor"></span>';
              container.scrollTop = container.scrollHeight;
            }
          }catch{}
        }
      });
    }

    aiDiv.innerHTML = marked.parse(aiMessage.content);
    saveState();

  }catch(err){
    aiDiv.innerHTML="Error occurred.";
  }
}

/* ==============================
   EVENTS
============================== */

document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("messageInput").addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("newChat").onclick = createChat;

document.getElementById("settingsBtn").onclick = ()=>{
  document.getElementById("settingsModal").classList.remove("hidden");
  document.getElementById("apiKeyInput").value = state.apiKey;
  document.getElementById("modelInput").value = state.model;
  document.getElementById("systemPromptInput").value = getActiveChat()?.systemPrompt || "";
};

document.getElementById("closeSettings").onclick = ()=>{
  document.getElementById("settingsModal").classList.add("hidden");
};

document.getElementById("saveSettings").onclick = ()=>{
  state.apiKey = document.getElementById("apiKeyInput").value.trim();
  state.model = document.getElementById("modelInput").value.trim();
  const chat = getActiveChat();
  if(chat){
    chat.systemPrompt = document.getElementById("systemPromptInput").value;
  }
  saveState();
  document.getElementById("settingsModal").classList.add("hidden");
};

document.getElementById("darkToggle").onclick = ()=>{
  state.dark = !state.dark;
  document.documentElement.classList.toggle("dark");
  saveState();
};

document.getElementById("openSidebar").onclick = ()=>{
  document.getElementById("sidebar").classList.remove("-translate-x-full");
};

document.getElementById("closeSidebar").onclick = ()=>{
  document.getElementById("sidebar").classList.add("-translate-x-full");
};

/* ==============================
   INIT
============================== */

if(!state.activeChatId && state.chats.length){
  state.activeChatId = state.chats[0].id;
}

renderChatList();
renderMessages();

loading.style.display="none";

}catch(e){
  console.error(e);
  loading.innerText="App failed to load.";
}

})();
</script>

</body>
</html>
